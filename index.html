<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğa Keşif Rehberi</title>
    <style>
        /* --- GENEL TASARIM VE DOĞAL RENK PALETİ --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; 
            padding: 20px; 
            background-color: #f8faf9; /* Hafif kırık beyaz doğa teması */
            color: #4a4a4a; 
        }

        /* Detay Sayfası Kartı */
        .card { 
            max-width: 500px; 
            margin: 30px auto; 
            background: white; 
            border-radius: 20px; /* Daha yumuşak köşeler */
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(90,140,107,0.1); /* Estetik yeşil gölge */
            display: none; 
        }

        .card img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
        }

        .content { 
            padding: 30px; 
        }

        h1 { 
            margin: 0 0 5px 0; 
            color: #3b5a4a; /* Asil koyu yeşil */
            font-size: 26px; 
            font-weight: 700;
        }

        .latin { 
            font-style: italic; 
            color: #8c8c8c; 
            margin-bottom: 25px; 
            display: block; 
            font-size: 14px; 
        }

        /* Hikaye Kutusu */
        .story-box { 
            background-color: #fdfdfd; 
            border-left: 5px solid #a3c1ad; /* Sol tarafta yaprak yeşili çizgi */
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(163,193,173,0.05); 
        }

        .section-title { 
            font-weight: bold; 
            color: #5a8c6b; /* Canlı yaprak yeşili başlıklar */
            margin-top: 20px; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        p { 
            line-height: 1.8; /* Ferah satır arası aralığı */
            font-size: 16px; 
            margin-top: 8px; 
        }

        /* Geri Dön Butonu */
        .back-btn {
            display: inline-block; 
            margin-top: 25px; 
            padding: 12px 24px;
            background-color: #5a8c6b;
            color: white !important;
            text-decoration: none; 
            font-weight: bold;
            border-radius: 50px; 
            transition: background 0.3s, transform 0.2s;
        }

        .back-btn:hover {
            background-color: #3b5a4a;
            transform: translateY(-2px);
        }

        /* --- ANA SAYFA KARŞILAMA PANELİ TASARIMI --- */
        .welcome-panel { 
            max-width: 500px; 
            margin: 40px auto; 
            background: white; 
            border-radius: 20px; 
            padding: 35px; 
            box-shadow: 0 10px 30px rgba(90,140,107,0.1); 
            text-align: center; 
            display: none; 
        }

        .welcome-panel h2 { 
            color: #3b5a4a; 
            margin-bottom: 12px; 
            font-size: 26px;
            font-weight: 700;
        }

        .tree-menu { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-top: 30px; 
        }

        /* Listedeki Ağaç Butonları */
        .tree-btn { 
            display: flex; 
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px; 
            background-color: #eef4f0; 
            color: #3b5a4a !important; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            transition: all 0.3s;
            border: 1px solid rgba(59,90,74,0.05);
        }

        .tree-btn:hover { 
            background-color: #5a8c6b; 
            color: white !important;
            transform: translateX(5px); /* Sağa doğru hafif kayma efekti */
            box-shadow: 0 4px 15px rgba(90,140,107,0.15);
        }

        .tree-btn::after {
            content: '→';
            font-size: 18px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-panel">
        <div style="font-size: 50px; margin-bottom: 15px;">🍃</div>
        <h2>Doğa Keşif Rehberi</h2>
        <p>Ağaçların üzerindeki karekodları okutarak hikayelerini dinleyebilir veya aşağıdaki listeden merak ettiğiniz ağacı seçerek keşfe başlayabilirsiniz:</p>
        <div id="tree-list" class="tree-menu"></div>
    </div>

    <div id="tree-card" class="card">
        <img id="agac-resim" src="" alt="Ağaç Resmi">
        <div class="content">
            <h1 id="agac-isim">Yükleniyor...</h1>
            <span id="agac-latin" class="latin"></span>
            
            <div class="section-title">Hikayem ve Özelliklerim</div>
            <div class="story-box">
                <p id="agac-bilgi"></p>
            </div>
            
            <div class="section-title">Ortalama Ömür</div>
            <p id="agac-omur"></p>
            
            <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
        </div>
    </div>

    <script>
        // TÜM AĞAÇ VERİLERİ, HİKAYELERİ VE YENİ RESİM YOLLARI
        const agacVerileri = {
            "ihlamur": {
                "isim": "Ihlamur Ağacı",
                "latince": "Tilia",
                "omur": "Ortalama 100 - 500 yıl yaşayabilirler.",
                "bilgi": "Merhaba! Ben mahallenizin, kampüsünüzün ya da parkınızın en mis kokulu sakinlerinden biriyim. Yaz başlangıcında açtığım sapsarı çiçeklerimle sadece arıları değil, kokumu içine çeken herkesi büyülerim. Büyükleriniz beni çok iyi tanır; kışın içinizi ısıtan, öksürüğünüzü hafifleten o şifalı çay işte benim kalbimden gelir. Yanımdan geçerken derin bir nefes almayı unutmayın!",
                "resim": "ihlamur.jpg"
            },
            "yalanci-akasya": {
                "isim": "Yalancı Akasya",
                "latince": "Robinia pseudoacacia",
                "omur": "Hızlı büyürler, ortalama 60 - 100 yıl yaşarlar.",
                "bilgi": "Bana 'Yalancı Akasya' dediklerine bakmayın, doğaya olan faydam tamamen gerçektir! Beyaz, salkım salkım çiçeklerimle baharda adeta bir gelinlik giyerim. Köklerimle toprağa öyle sıkı tutunurum ki erozyonu engellemekte üstüme yoktur. Zorlu, kurak ve hava kirliliğinin yoğun olduğu şehirlerde bile inatla direnir, size temiz hava üretirim. Mücadeleci bir dost arıyorsanız, buradayım.",
                "resim": "yalanci-akasya.jpg"
            },
            "akdeniz-servisi": {
                "isim": "Akdeniz Servisi",
                "latince": "Cupressus sempervirens",
                "omur": "2000 yıla kadar yaşayabilen anıtsal ağaçlardandır.",
                "bilgi": "Gökyüzüne doğru uzanan dimdik, asil endamımı fark ettiniz mi? Ben Akdeniz Servisiyim. Yaz-kış yapraklarımı dökmediğim için antik çağlardan beri 'ebedi yaşamın' sembolüyüm. Rüzgarlara karşı doğal bir rüzgarkıran (kalkan) gibi durur, sert fırtınaları göğsümde yumuşatırım. Kendine has Akdeniz kokulu reçinemle doğaya asalet katıyorum.",
                "resim": "akdeniz-servisi.jpg"
            },
            "arizona-servisi": {
                "isim": "Arizona Servisi",
                "latince": "Cupressus arizonica",
                "omur": "100 - 200 yıl arasında yaşayabilirler.",
                "bilgi": "Ben uzaklardan, Amerika'nın yarı kurak kanyonlarından buralara misafir gelmiş bir Arizona Servisiyim. Kuraklığa, sıcağa ve çetin don olaylarına karşı doğuştan şerbetliyim. Yapraklarımın rengine dikkatli bakın; yeşilden ziyade büyüleyici bir gümüş-mavi tonu göreceksiniz. Susuzluğa meydan okuyan yapımla peyzajın en dayanıklı ve estetik süsüyüm.",
                "resim": "arizona-servisi.jpg"
            },
            "karacam": {
                "isim": "Karaçam",
                "latince": "Pinus nigra",
                "omur": "500 yıldan fazla yaşayabilir.",
                "bilgi": "Adım Karaçam, çünkü gövdemi kaplayan kabuklar koyu renkli, kalın ve derindir. Anadolu'nun asıl ve kadim sahiplerinden biriyim. Dağların en yüksek yerlerinde, kimsenin yaşayamadığı kayalıklarda bile kök salabilirim. Sert iğne yapraklarımla kışın bembeyaz karlar altında bile yeşil kalır, orman canlılarına sıcak bir yuva sunarım.",
                "resim": "karacam.jpg"
            },
            "zeytin": {
                "isim": "Zeytin Ağacı",
                "latince": "Olea europaea",
                "omur": "Binlerce yıl yaşayabilir; mitolojide 'Ölmez Ağaç' olarak bilinir.",
                "bilgi": "Bana yaklaşırken tarih sayfalarını araladığınızı hissedin, çünkü ben insanlık tarihinin en eski şahidiyim. Yapraklarımla barışı, meyve ve yağımla sağlığı ve bereketi temsil ederim. Gövdem yıllar geçtikçe bükülür, derin yarıklar açılır ama her bahar yeniden canlanır, zeytinlerimi taptaze sunarım. Ben bilgeliğin ve ölümsüzlüğün ta kendisiyim.",
                "resim": "zeytin.jpg"
            },
            "ladin": {
                "isim": "Ladin",
                "latince": "Picea",
                "omur": "Ortalama 400 - 600 yıl boyunca yaşayabilirler.",
                "bilgi": "Kusursuz bir piramit şeklindeki gövdeme uzaktan bakınca beni hemen tanırsınız; ben Ladin ağacıyım! Genellikle soğuk ve nemli iklimleri, yüksek dağ yamaçlarını severim. Dallarım o kadar sık ve simetriktir ki, kışın yağan karları bir yorgan gibi taşır ama kırılmam. Kozalaklarım dallarımdan aşağıya doğru sarkık durur. Müziğe can veren kemanların, gitarların gövdesinde benim odunum saklıdır.",
                "resim": "ladin.jpg"
            },
            "mavi-servi": {
                "isim": "Mavi Servi",
                "latince": "Cupressus glabra",
                "omur": "100 ile 300 yıl arasında sağlıkla yaşayabilirler.",
                "bilgi": "Doğanın en asil renk kartelasından çıktım geldim: Karşınızda Mavi Servi! Yeşilin sıradanlığına inat, mavi-yeşil ve dumanlı gümüş rengi yapraklarımla etrafıma hemen fark yaratırım. Dokunduğunuzda elinizde bırakacağım o taze limonumsu reçine kokusu benim imzamdır. Budanmaya ve şekil verilmeye çok yatkın olduğum için parkların en şık mimari figürüyüm. Gökyüzüne uzanan renkli bir fırça darbesiyim.",
                "resim": "mavi-servi.jpg"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const agacId = urlParams.get('id');

        // URL kontrolü ve Sayfa Geçiş Mantığı
        if (agacId && agacVerileri[agacId]) {
            const agac = agacVerileri[agacId];
            document.getElementById('tree-card').style.display = 'block';
            document.getElementById('agac-isim').innerText = agac.isim;
            document.getElementById('agac-latin').innerText = agac.latince;
            document.getElementById('agac-omur').innerText = agac.omur;
            document.getElementById('agac-bilgi').innerText = agac.bilgi;
            document.getElementById('agac-resim').src = agac.resim;
            document.title = agac.isim + " - Keşif Rehberi";
        } else {
            document.getElementById('welcome-screen').style.display = 'block';
            const listContainer = document.getElementById('tree-list');
            
            Object.keys(agacVerileri).forEach(key => {
                const btn = document.createElement('a');
                btn.href = `index.html?id=${key}`;
                btn.className = 'tree-btn';
                btn.innerText = `🌲 ${agacVerileri[key].isim}`;
                listContainer.appendChild(btn);
            });
        }
    </script>
</body>
</html>
