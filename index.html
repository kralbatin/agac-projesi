<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağaç Bilgi Sistemi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f5; color: #333; }
        .card { max-width: 500px; margin: 40px auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .content { padding: 25px; }
        h1 { margin: 0 0 5px 0; color: #2e6f40; font-size: 24px; }
        .latin { font-style: italic; color: #666; margin-bottom: 20px; display: block; font-size: 14px; }
        .section-title { font-weight: bold; color: #2e6f40; margin-top: 15px; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        p { line-height: 1.6; font-size: 15px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <img id="agac-resim" src="" alt="Ağaç Resmi">
        <div class="content">
            <h1 id="agac-isim">Yükleniyor...</h1>
            <span id="agac-latin" class="latin"></span>
            
            <div class="section-title">Ortalama Ömür</div>
            <p id="agac-omur"></p>
            
            <div class="section-title">Ağaç Hakkında Bilgi</div>
            <p id="agac-bilgi"></p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const agacId = urlParams.get('id');

        fetch('agaclar.json')
            .then(response => response.json())
            .then(data => {
                if(data[agacId]) {
                    const agac = data[agacId];
                    document.getElementById('agac-isim').innerText = agac.isim;
                    document.getElementById('agac-latin').innerText = agac.latince;
                    document.getElementById('agac-omur').innerText = agac.omur;
                    document.getElementById('agac-bilgi').innerText = agac.bilgi;
                    document.getElementById('agac-resim').src = agac.resim;
                    document.title = agac.isim + " - Bilgi Sayfası";
                } else {
                    document.getElementById('agac-isim').innerText = "Ağaç Bulunamadı";
                    document.getElementById('agac-bilgi').innerText = "Lütfen karekodu tekrar okutunuz veya sistem yöneticisine bildiriniz.";
                    document.getElementById('agac-latin').innerText = "";
                    document.getElementById('agac-omur').innerText = "-";
                    document.getElementById('agac-resim').style.display = 'none';
                }
            })
            .catch(error => {
                console.error("Hata:", error);
            });
    </script>
</body>
</html>
