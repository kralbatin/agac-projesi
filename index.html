<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğa Keşif Rehberi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f5; color: #333; }
        .card { max-width: 500px; margin: 20px auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .content { padding: 25px; }
        h1 { margin: 0 0 5px 0; color: #2e6f40; font-size: 24px; }
        .latin { font-style: italic; color: #666; margin-bottom: 20px; display: block; font-size: 14px; }
        .story-box { background-color: #f9fbf9; border-left: 4px solid #2e6f40; padding: 15px; margin: 15px 0; border-radius: 0 8px 8px 0; }
        .section-title { font-weight: bold; color: #2e6f40; margin-top: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        p { line-height: 1.6; font-size: 15px; margin-top: 5px; }
        
        /* Karşılama Paneli */
        .welcome-panel { max-width: 500px; margin: 40px auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; display: none; }
        .welcome-panel h2 { color: #2e6f40; margin-bottom: 10px; }
        .tree-menu { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .tree-btn { display: block; padding: 12px; background-color: #2e6f40; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
        .tree-btn:hover { background-color: #1e4b2a; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="welcome-panel">
        <h2>Doğa Keşif Rehberine Hoş Geldiniz! 🌿</h2>
        <p>Ağaçların üzerindeki karekodları okutarak hikayelerini dinleyebilir veya aşağıdaki listeden merak ettiğiniz ağacı seçerek keşfe başlayabilirsiniz:</p>
        <div id="tree-list" class="tree-menu"></div>
    </div>

    <div id="tree-card" class="card">
        <img id="agac-resim" src="" alt="Ağaç Resmi">
        <div class="content">
            <h1 id="agac-isim">Yükleniyor...</h1>
            <span id="agac-latin" class="latin"></span>
            
            <div class="section-title">Hikayem ve Özelliklerim</div>
            <div class="story-box">
                <p id="agac-bilgi"></p>
            </div>
            
            <div class="section-title">Ortalama Ömür / Bilgi</div>
            <p id="agac-omur"></p>
            
            <a href="index.html" style="display:inline-block; margin-top:20px; color:#2e6f40; text-decoration:none; font-weight:bold;">← Ana Sayfaya Dön</a>
        </div>
    </div>

    <script>
        // TÜM AĞAÇ VERİLERİ VE HİKAYELERİ (8 AĞAÇ EKSİKSİZ)
        const agacVerileri = {
            "ihlamur": {
                "isim": "Ihlamur Ağacı",
                "latince": "Tilia",
                "omur": "Ortalama 100 - 500 yıl yaşayabilirler.",
                "bilgi": "Merhaba! Ben mahallenizin, kampüsünüzün ya da parkınızın en mis kokulu sakinlerinden biriyim. Yaz başlangıcında açtığım sapsarı çiçeklerimle sadece arıları değil, kokumu içine çeken herkesi büyülerim. Büyükleriniz beni çok iyi tanır; kışın içinizi ısıtan, öksürüğünüzü hafifleten o şifalı çay işte benim kalbimden gelir. Yanımdan geçerken derin bir nefes almayı unutmayın!",
                "resim": "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=500&q=80"
            },
            "yalanci-akasya": {
                "isim": "Yalancı Akasya",
                "latince": "Robinia pseudoacacia",
                "omur": "Hızlı büyürler, ortalama 60 - 100 yıl yaşarlar.",
                "bilgi": "Bana 'Yalancı Akasya' dediklerine bakmayın, doğaya olan faydam tamamen gerçektir! Beyaz, salkım salkım çiçeklerimle baharda adeta bir gelinlik giyerim. Köklerimle toprağa öyle sıkı tutunurum ki erozyonu engellemekte üstüme yoktur. Zorlu, kurak... hava kirliliğinin yoğun olduğu şehirlerde bile inatla direnir, size temiz hava üretirim. Mücadeleci bir dost arıyorsanız, buradayım.",
                "resim": "https://images.unsplash.com/photo-1601564267624-916c871dcc63?auto=format&fit=crop&w=500&q=80"
            },
            "akdeniz-servisi": {
                "isim": "Akdeniz Servisi",
                "latince": "Cupressus sempervirens",
                "omur": "2000 yıla kadar yaşayabilen anıtsal ağaçlardandır.",
                "bilgi": "Gökyüzüne doğru uzanan dimdik, asil endamımı fark ettiniz mi? Ben Akdeniz Servisiyim. Yaz-kış yapraklarımı dökmediğim için antik çağlardan beri 'ebedi yaşamın' sembolüyüm. Rüzgarlara karşı doğal bir rüzgarkıran (kalkan) gibi durur, sert fırtınaları göğsümde yumuşatırım. Kendine has Akdeniz kokulu reçinemle doğaya asalet katıyorum.",
                "resim": "https://images.unsplash.com/photo-1583091937989-1383bdc1dbe4?auto=format&fit=crop&w=500&q=80"
            },
            "arizona-servisi": {
                "isim": "Arizona Servisi",
                "latince": "Cupressus arizonica",
                "omur": "100 - 200 yıl arasında yaşayabilirler.",
                "bilgi": "Ben uzaklardan, Amerika'nın yarı kurak kanyonlarından buralara misafir gelmiş bir Arizona Servisiyim. Kuraklığa, sıcağa ve çetin don olaylarına karşı doğuştan şerbetliyim. Yapraklarımın rengine dikkatli bakın; yeşilden ziyade büyüleyici bir gümüş-mavi tonu göreceksiniz. Susuzluğa meydan okuyan yapımla peyzajın en dayanıklı ve estetik süsüyüm.",
                "resim": "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&w=500&q=80"
            },
            "karacam": {
                "isim": "Karaçam",
                "latince": "Pinus nigra",
                "omur": "Uykusu derin, ömrü uzundur; 500 yıldan fazla yaşayabilir.",
                "bilgi": "Adım Karaçam, çünkü gövdemi kaplayan kabuklar koyu renkli, kalın ve derindir. Anadolu'nun asıl ve kadim sahiplerinden biriyim. Dağların en yüksek yerlerinde, kimsenin yaşayamadığı kayalıklarda bile kök salabilirim. Sert iğne yapraklarımla kışın bembeyaz karlar altında bile yeşil kalır, orman canlılarına sıcak bir yuva sunarım.",
                "resim": "https://images.unsplash.com/photo-1547619220-6d80ff3d5a2d?auto=format&fit=crop&w=500&q=80"
            },
            "zeytin": {
                "isim": "Zeytin Ağacı",
                "latince": "Olea europaea",
                "omur": "Binlerce yıl yaşayabilir; mitolojide 'Ölmez Ağaç' olarak bilinir.",
                "bilgi": "Bana yaklaşırken tarih sayfalarını araladığınızı hissedin, çünkü ben insanlık tarihinin en eski şahidiyim. Yapraklarımla barışı, meyve ve yağımla sağlığı ve bereketi temsil ederim. Gövdem yıllar geçtikçe bükülür, derin yarıklar açılır ama her bahar yeniden canlanır, zeytinlerimi taptaze sunarım. Ben bilgeliğin ve ölümsüzlüğün ta kendisiyim.",
                "resim": "https://images.unsplash.com/photo-1471193945509-9ad0617afabf?auto=format&fit=crop&w=500&q=80"
            },
            "ladin": {
                "isim": "Ladin",
                "latince": "Picea",
                "omur": "Ortalama 400 - 600 yıl boyunca yaşayabilirler.",
                "bilgi": "Kusursuz bir piramit şeklindeki gövdeme uzaktan bakınca beni hemen tanırsınız; ben Ladin ağacıyım! Genellikle soğuk ve nemli iklimleri, yüksek dağ yamaçlarını severim. Dallarım o kadar sık ve simetriktir ki, kışın yağan karları bir yorgan gibi taşır ama kırılmam. Kozalaklarım dallarımdan aşağıya doğru sarkık durur (beni çamlardan ayıran en tatlı özelliğim budur). Müziğe can veren kemanların, gitarların gövdesinde benim odunum saklıdır.",
                "resim": "https://images.unsplash.com/photo-1608501821300-4f99e58bba77?auto=format&fit=crop&w=500&q=80"
            },
            "mavi-servi": {
                "isim": "Mavi Servi",
                "latince": "Cupressus glabra",
                "omur": "100 ile 300 yıl arasında sağlıkla yaşayabilirler.",
                "bilgi": "Doğanın en asil renk kartelasından çıktım geldim: Karşınızda Mavi Servi! Yeşilin sıradanlığına inat, mavi-yeşil ve dumanlı gümüş rengi yapraklarımla etrafıma hemen fark yaratırım. Dokunduğunuzda elinizde bırakacağım o taze limonumsu reçine kokusu benim imzamdır. Budanmaya ve şekil verilmeye çok yatkın olduğum için parkların en şık mimari figürüyüm. Gökyüzüne uzanan renkli bir fırça darbesiyim.",
                "resim": "https://images.unsplash.com/photo-1500622944204-b135684e99fd?auto=format&fit=crop&w=500&q=80"
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const agacId = urlParams.get('id');

        if (agacId && agacVerileri[agacId]) {
            const agac = agacVerileri[agacId];
            document.getElementById('tree-card').style.display = 'block';
            document.getElementById('agac-isim').innerText = agac.isim;
            document.getElementById('agac-latin').innerText = agac.latince;
            document.getElementById('agac-omur').innerText = agac.omur;
            document.getElementById('agac-bilgi').innerText = agac.bilgi;
            document.getElementById('agac-resim').src = agac.resim;
            document.title = agac.isim + " - Keşif Rehberi";
        } else {
            document.getElementById('welcome-screen').style.display = 'block';
            const listContainer = document.getElementById('tree-list');
            
            Object.keys(agacVerileri).forEach(key => {
                const btn = document.createElement('a');
                btn.href = `index.html?id=${key}`;
                btn.className = 'tree-btn';
                btn.innerText = `🌲 ${agacVerileri[key].isim} Sayfasını Gör`;
                listContainer.appendChild(btn);
            });
        }
    </script>
</body>
</html>
